<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn - Music Buff</title>
  <link rel="icon" href="../img/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../CSS/style.css">
  <style>
    /* Contenedor principal de la página 'Learn' */
    .learn-container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; display:flex; gap:2rem; align-items:flex-start; }

     /* Columna izquierda: Video */
     .learn-left { flex: 0.4; min-width:0; }
    .learn-left img { width:100%; max-height:360px; display:block; border-radius:8px; object-fit:cover; }
    /* Video sencillo que reemplaza la imagen: usa 'bajovideo.mp4' en la carpeta img/ */
    .learn-left video { width:100%; max-height:360px; display:block; border-radius:8px; object-fit:cover; }

     /* Columna derecha: texto 'Learn with us' y sección 'About us'
       - Se elimina el cuadro (fondo/borde) del párrafo principal. */
     .learn-right { flex: 0.6; min-width:0; display:flex; flex-direction:column; gap:1rem; }
     .learn-right h2 { margin:0 0 0.5rem 0; font-size:1.75rem; }
     .learn-right p { margin:0; }
     /* Sección adicional 'About us' con estilo sencillo */
     .about-section p { margin:0; color:#444; }

    /* Responsive: en pantallas pequeñas apilar verticalmente */
    @media (max-width:900px) {
      .learn-container { flex-direction:column; }
    }
  </style>
</head>
<body>
  <!-- Header: copiado del resto del sitio (logo, búsqueda, inicio de sesión y carrito) -->
  <header>
    <div class="header-top">
      <a href="/" class="logo-wrap">
        <img src="../img/Logo.png" alt="Music Buff" class="logo-img">
      </a>
      <div class="search-and-signin">
        <div class="search-wrap">
          <input type="search" class="search-bar" placeholder="Search for instruments and more..." aria-label="Search">
        </div>
        <a href="#signin" class="header-signin">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Sign in
        </a>
      </div>
      <div class="header-actions">
        <a href="#cart" aria-label="Cart">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </a>
      </div>
    </div>
    <nav class="nav-main">
      <div class="nav-main-inner">
        <ul class="nav-links">
          <li><a href="../index.html">Guitars</a></li>
          <li><a href="#amps">Amps</a></li>
          <li><a href="#2ndhand">2nd hand</a></li>
          <li><a href="#drums">Drums</a></li>
          <li><a href="#bass">Bass</a></li>
          <li><a href="#more">More</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Main: dos columnas (izq: imagen piano; der: texto 'Learn with us') -->
  <main>
    <div class="learn-container">
      <div class="learn-left">
        <!-- /* Video sencillo: se usa 'bajovideo.mp4' - autoplay + loop (muted para autoplay compatible) */ -->
        <video src="../img/bajovideo.mp4" controls autoplay loop muted playsinline aria-label="Video bajovideo">
          Tu navegador no soporta el elemento de video.
        </video>
      </div>
      <div class="learn-right">
        <h2>About us</h2>
        <p>/* Aquí va el texto descriptivo que reemplazarás más tarde. */</p>
        <div class="about-section">
          <h3>About us</h3>
          <p>/* Aquí irá el texto de About us. */</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer: bloques y redes sociales (igual que en el resto del sitio) -->
  <footer class="site-footer">
    <div class="footer-blocks">
      <div class="footer-block">Contact us</div>
      <div class="footer-block">About us</div>
      <div class="footer-block footer-social">
        <span class="footer-icon" aria-label="Instagram">
          <img src="../img/logotipo-de-instagram.png" alt="Instagram">
        </span>
        <span class="footer-icon" aria-label="Facebook">
          <img src="../img/facebook.png" alt="Facebook">
        </span>
        <span class="footer-icon" aria-label="Logotipos">
          <img src="../img/logotipos.png" alt="Logotipos">
        </span>
      </div>
    </div>
  </footer>
</body>
</html>
